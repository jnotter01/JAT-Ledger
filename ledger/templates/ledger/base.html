<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JAT Ledger</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
            background-color: #f7f7f7;
            color: #222;
        }

        header {
            margin-bottom: 2rem;
        }

        nav a {
            margin-right: 1rem;
        }

        main {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            max-width: 900px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 1rem;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 0.5rem;
            text-align: left;
        }

        th {
            background-color: #eee;
        }

        label {
            display: block;
            margin-top: 1rem;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            max-width: 500px;
            padding: 0.4rem;
            margin-top: 0.25rem;
        }

        button {
            margin-top: 1rem;
            padding: 0.5rem 1rem;
        }

        .summary-box {
            border: 1px solid #ccc;
            padding: 1rem;
            margin-top: 1rem;
            background-color: #fafafa;
        }
    </style>
</head>
<body>
    <header>
        <h1>JAT Ledger</h1>
        <nav>
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <a href="{% url 'property_list' %}">Properties</a>
                <a href="{% url 'category_list' %}">Categories</a>
                <a href="{% url 'transaction_list' %}">Transactions</a>
                <a href="{% url 'transaction_create' %}">Add Transaction</a>
                <a href="{% url 'report_summary' %}">Summary Report</a>
                <a href="/admin/">Admin</a>

                <form method="post" action="{% url 'logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit">Logout</button>
                </form>

                <span>Logged in as {{ user.username }}</span>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'signup' %}">Create Account</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
